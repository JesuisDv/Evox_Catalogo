<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evox Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #10101a; --surface2: #17172a;
      --border: #2a2a45; --accent: #9b5de5; --accent-bright: #c084fc;
      --accent-dim: rgba(155,93,229,0.1); --text: #f0f0f8; --text-muted: #6666aa;
      --danger: #ff4444; --success: #00cc88; --radius: 4px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-weight: 300; min-height: 100vh; }

    /* LOGIN */
    #login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    #admin-screen { display:none; }
    .login-box { background:var(--surface); border:1px solid var(--border); padding:48px 40px; width:100%; max-width:380px; }
    .logo { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:4px; margin-bottom:8px; }
    .logo span { color:var(--accent-bright); }
    .login-sub { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); margin-bottom:40px; }
    .field { margin-bottom:16px; }
    .field label { display:block; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px; }
    .field input, .field textarea {
      width:100%; background:var(--surface2); border:1px solid var(--border);
      color:var(--text); font-family:'Inter',sans-serif; font-size:13px;
      padding:12px 16px; outline:none; transition:border-color 0.2s; border-radius:var(--radius);
    }
    .field input:focus, .field textarea:focus { border-color:var(--accent); }
    .login-error { background:rgba(255,68,68,0.1); border:1px solid var(--danger); color:var(--danger); padding:10px 16px; font-size:12px; letter-spacing:1px; margin-bottom:16px; display:none; }
    .btn { background:var(--accent); color:#000; border:none; font-family:'Inter',sans-serif; font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; padding:14px 24px; cursor:pointer; width:100%; transition:opacity 0.2s; border-radius:var(--radius); }
    .btn:hover { opacity:0.85; }
    .btn-ghost { background:transparent; border:1px solid var(--border); color:var(--text-muted); }
    .btn-ghost:hover { border-color:var(--text-muted); color:var(--text); opacity:1; }
    .btn-danger { background:transparent; border:1px solid var(--danger); color:var(--danger); }
    .btn-danger:hover { background:var(--danger); color:white; opacity:1; }
    .btn-sm { padding:8px 16px; font-size:10px; width:auto; }

    /* ADMIN LAYOUT */
    header { padding:20px 40px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:rgba(10,10,15,0.95); backdrop-filter:blur(12px); z-index:100; }
    .header-right { display:flex; align-items:center; gap:16px; }
    .save-status { font-size:11px; letter-spacing:1px; color:var(--text-muted); }
    .save-status.saving { color:var(--accent-bright); }
    .save-status.saved  { color:var(--success); }
    .save-status.error  { color:var(--danger); }
    .admin-body { display:grid; grid-template-columns:280px 1fr; min-height:calc(100vh - 65px); }

    /* SIDEBAR */
    .sidebar { border-right:1px solid var(--border); padding:24px; overflow-y:auto; }
    .sidebar-title { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--text-muted); margin-bottom:16px; }
    .cat-list { list-style:none; margin-bottom:20px; }
    .cat-item { display:flex; align-items:center; gap:8px; padding:10px 12px; cursor:pointer; border:1px solid transparent; border-radius:var(--radius); margin-bottom:4px; transition:all 0.15s; user-select:none; }
    .cat-item:hover { background:var(--surface2); border-color:var(--border); }
    .cat-item.active { background:var(--accent-dim); border-color:var(--accent); color:var(--accent-bright); }
    .cat-item .drag-handle { color:var(--text-muted); cursor:grab; opacity:0.4; }
    .cat-item .cat-name { flex:1; font-size:12px; font-weight:500; letter-spacing:1px; text-transform:uppercase; }
    .cat-item .cat-count { font-size:10px; color:var(--text-muted); }
    .cat-item.drag-over { border-color:var(--accent); background:var(--accent-dim); }
    .divider { border:none; border-top:1px solid var(--border); margin:20px 0; }

    /* PANEL */
    .panel { padding:32px 40px; overflow-y:auto; }
    .panel-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; }
    .panel-title { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:2px; }
    .section { background:var(--surface); border:1px solid var(--border); padding:24px; margin-bottom:20px; border-radius:var(--radius); }
    .section-title { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--text-muted); margin-bottom:20px; }
    .design-list { list-style:none; margin-bottom:20px; }
    .design-item { display:flex; align-items:center; gap:12px; padding:12px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:8px; }
    .design-thumb { width:48px; height:48px; object-fit:contain; border-radius:2px; flex-shrink:0; display:block; }
    .design-thumb-placeholder { width:48px; height:48px; border-radius:2px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:18px; }
    .design-info { flex:1; min-width:0; }
    .design-name { font-size:12px; font-weight:500; letter-spacing:1px; text-transform:uppercase; margin-bottom:4px; }
    .design-url { font-size:10px; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .design-bg-dot { width:14px; height:14px; border-radius:50%; flex-shrink:0; border:1px solid rgba(255,255,255,0.2); }
    .icon-btn { background:none; border:1px solid var(--border); color:var(--text-muted); width:32px; height:32px; cursor:pointer; border-radius:var(--radius); display:flex; align-items:center; justify-content:center; font-size:14px; transition:all 0.15s; }
    .icon-btn:hover { color:var(--danger); border-color:var(--danger); }
    .add-form { border:1px dashed var(--border); padding:20px; border-radius:var(--radius); }
    .add-form-row { display:grid; grid-template-columns:1fr 2fr 90px auto; gap:12px; align-items:end; }
    .add-form-note { font-size:10px; color:var(--text-muted); margin-top:10px; letter-spacing:1px; }
    .color-picker-wrap { display:flex; flex-direction:column; gap:6px; }
    .color-picker-wrap label { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); }
    .color-picker-inner { display:flex; align-items:center; gap:8px; }
    .color-picker-inner input[type="color"] { width:44px; height:44px; padding:2px; background:var(--surface2); border:1px solid var(--border); cursor:pointer; border-radius:var(--radius); }
    .color-hex { font-size:10px; color:var(--text-muted); letter-spacing:1px; }
    .empty-panel { padding:60px; text-align:center; color:var(--text-muted); font-size:13px; letter-spacing:1px; }

    /* TOAST */
    .toast { position:fixed; bottom:32px; right:32px; background:var(--surface); border:1px solid var(--border); padding:14px 20px; font-size:12px; letter-spacing:1px; z-index:9999; display:none; align-items:center; min-width:240px; }
    .toast.show { display:flex; }
    .toast.success { border-color:var(--success); color:var(--success); }
    .toast.error   { border-color:var(--danger); color:var(--danger); }

    @media (max-width:768px) {
      .admin-body { grid-template-columns:1fr; }
      .sidebar { border-right:none; border-bottom:1px solid var(--border); }
      header { padding:16px 20px; }
      .panel { padding:24px 20px; }
      .add-form-row { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo">EVOX<span>.</span>WEAR</div>
    <p class="login-sub">Panel de administración</p>
    <div class="login-error" id="login-error">Contraseña incorrecta</div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="pwd-input" placeholder="••••••••" />
    </div>
    <button class="btn" id="login-btn">Entrar</button>
  </div>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────
  var GITHUB_USER = 'JesuisDv';
  var GITHUB_REPO = 'Evox_Catalogo';
  var DATA_FILE   = 'catalog.json';
  var ADMIN_PASS  = 'evox2024';
  // ────────────────────────────────────────────────────────

  var catalog   = [];
  var activeCat = null;
  var ghToken   = '';
  var dragSrc   = null;
  var toastTimer;

  // ── INIT ─────────────────────────────────────────────────
  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('pwd-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
  document.getElementById('logout-btn').addEventListener('click', doLogout);
  document.getElementById('save-btn').addEventListener('click', saveToGitHub);
  document.getElementById('add-cat-btn').addEventListener('click', addCategory);
  document.getElementById('new-cat-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') addCategory(); });

  // ── AUTH ─────────────────────────────────────────────────
  function doLogin() {
    var pwd = document.getElementById('pwd-input').value;
    if (pwd !== ADMIN_PASS) {
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('pwd-input').value = '';
      return;
    }
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    ghToken = localStorage.getItem('evox_gh_token') || '';
    if (!ghToken) {
      var t = prompt('Ingresa tu GitHub Token (se guarda en tu navegador):');
      if (t) { ghToken = t.trim(); localStorage.setItem('evox_gh_token', ghToken); }
    }
    loadFromGitHub();
  }

  function doLogout() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('admin-screen').style.display = 'none';
    document.getElementById('pwd-input').value = '';
  }

  // ── GITHUB ───────────────────────────────────────────────
  async function loadFromGitHub() {
    setStatus('Cargando...', 'saving');
    try {
      var res = await fetch(
        'https://api.github.com/repos/' + GITHUB_USER + '/' + GITHUB_REPO + '/contents/' + DATA_FILE,
        { headers: { Authorization: 'token ' + ghToken, Accept: 'application/vnd.github+json' } }
      );
      if (res.status === 404) { catalog = []; setStatus('Catálogo vacío', ''); renderSidebar(); return; }
      var data = await res.json();
      catalog = JSON.parse(atob(data.content.replace(/\n/g, '')));
      setStatus('Cargado ✓', 'saved');
      renderSidebar();
    } catch(e) {
      setStatus('Error al cargar', 'error');
      showToast('Error al cargar desde GitHub', 'error');
    }
  }

  async function saveToGitHub() {
    setStatus('Guardando...', 'saving');
    try {
      var checkRes = await fetch(
        'https://api.github.com/repos/' + GITHUB_USER + '/' + GITHUB_REPO + '/contents/' + DATA_FILE,
        { headers: { Authorization: 'token ' + ghToken, Accept: 'application/vnd.github+json' } }
      );
      var sha = '';
      if (checkRes.ok) { var checkData = await checkRes.json(); sha = checkData.sha; }

      var content = btoa(unescape(encodeURIComponent(JSON.stringify(catalog, null, 2))));
      var body = { message: 'Update catalog', content: content };
      if (sha) body.sha = sha;

      var res = await fetch(
        'https://api.github.com/repos/' + GITHUB_USER + '/' + GITHUB_REPO + '/contents/' + DATA_FILE,
        {
          method: 'PUT',
          headers: { Authorization: 'token ' + ghToken, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        }
      );
      if (!res.ok) throw new Error(await res.text());
      setStatus('Guardado ✓', 'saved');
      showToast('Catálogo guardado correctamente', 'success');
    } catch(e) {
      setStatus('Error al guardar', 'error');
      showToast('Error al guardar: ' + e.message, 'error');
    }
  }

  // ── CATEGORIES ───────────────────────────────────────────
  function addCategory() {
    var input = document.getElementById('new-cat-input');
    var name  = input.value.trim();
    if (!name) return;
    catalog.push({ name: name, designs: [] });
    input.value = '';
    activeCat = catalog.length - 1;
    renderSidebar();
    renderPanel();
    setStatus('Sin guardar', '');
  }

  function deleteCategory(i) {
    if (!confirm('¿Eliminar la categoría "' + catalog[i].name + '" y todos sus diseños?')) return;
    catalog.splice(i, 1);
    if (activeCat >= catalog.length) activeCat = catalog.length - 1;
    if (activeCat < 0) activeCat = null;
    renderSidebar();
    renderPanel();
    setStatus('Sin guardar', '');
  }

  function renameCategory(i) {
    var name = prompt('Nuevo nombre:', catalog[i].name);
    if (name && name.trim()) {
      catalog[i].name = name.trim();
      renderSidebar();
      renderPanel();
      setStatus('Sin guardar', '');
    }
  }

  // ── DESIGNS ──────────────────────────────────────────────
  function addDesign() {
    if (activeCat === null) return;
    var name = document.getElementById('d-name').value.trim();
    var url  = document.getElementById('d-url').value.trim();
    var bg   = document.getElementById('d-bg').value || '#ffffff';
    if (!name || !url) { showToast('Completa nombre y URL', 'error'); return; }
    catalog[activeCat].designs.push({ name: name, url: url, bg: bg });
    document.getElementById('d-name').value = '';
    document.getElementById('d-url').value  = '';
    document.getElementById('d-bg').value   = '#ffffff';
    document.getElementById('d-bg-hex').textContent = '#ffffff';
    renderPanel();
    setStatus('Sin guardar', '');
  }

  function deleteDesign(i) {
    catalog[activeCat].designs.splice(i, 1);
    renderPanel();
    setStatus('Sin guardar', '');
  }

  function extractFileId(url) {
    if (!url) return null;
    if (url.indexOf('/drive/folders/') !== -1) return null;
    var patterns = [/\/file\/d\/([a-zA-Z0-9_-]+)/, /[?&]id=([a-zA-Z0-9_-]+)/, /\/d\/([a-zA-Z0-9_-]+)/];
    for (var i = 0; i < patterns.length; i++) {
      var m = url.match(patterns[i]);
      if (m) return m[1];
    }
    return null;
  }

  // ── RENDER ───────────────────────────────────────────────
  function renderSidebar() {
    var list = document.getElementById('cat-list');
    list.innerHTML = '';
    catalog.forEach(function(cat, i) {
      var li = document.createElement('li');
      li.className = 'cat-item' + (i === activeCat ? ' active' : '');
      li.draggable = true;
      li.innerHTML =
        '<span class="drag-handle">⠿</span>' +
        '<span class="cat-name">' + cat.name + '</span>' +
        '<span class="cat-count">' + cat.designs.length + '</span>';
      li.addEventListener('click', function() { selectCat(i); });
      li.addEventListener('dragstart', function(e) { dragStart(e, i); });
      li.addEventListener('dragover',  function(e) { dragOver(e, i); });
      li.addEventListener('drop',      function(e) { dragDrop(e, i); });
      li.addEventListener('dragend',   dragEnd);
      list.appendChild(li);
    });
  }

  function selectCat(i) {
    activeCat = i;
    renderSidebar();
    renderPanel();
  }

  function renderPanel() {
    var panel = document.getElementById('panel');
    if (activeCat === null || activeCat >= catalog.length) {
      panel.innerHTML = '<div class="empty-panel">← Selecciona o crea una categoría para empezar</div>';
      return;
    }
    var cat = catalog[activeCat];

    // Clear panel
    panel.innerHTML = '';

    // Header
    var header = document.createElement('div');
    header.className = 'panel-header';
    header.innerHTML =
      '<h2 class="panel-title">' + cat.name + '</h2>' +
      '<div style="display:flex;gap:8px;">' +
        '<button class="btn btn-ghost btn-sm" id="rename-btn">✏️ Renombrar</button>' +
        '<button class="btn btn-danger btn-sm" id="delete-cat-btn">🗑 Eliminar categoría</button>' +
      '</div>';
    panel.appendChild(header);

    document.getElementById('rename-btn').addEventListener('click', function() { renameCategory(activeCat); });
    document.getElementById('delete-cat-btn').addEventListener('click', function() { deleteCategory(activeCat); });

    // Section
    var section = document.createElement('div');
    section.className = 'section';

    var secTitle = document.createElement('div');
    secTitle.className = 'section-title';
    secTitle.textContent = 'Diseños (' + cat.designs.length + ')';
    section.appendChild(secTitle);

    // Design list
    var ul = document.createElement('ul');
    ul.className = 'design-list';

    if (!cat.designs.length) {
      var empty = document.createElement('li');
      empty.style.cssText = 'font-size:12px;color:var(--text-muted);padding:12px;letter-spacing:1px;';
      empty.textContent = 'No hay diseños aún. Agrega uno abajo.';
      ul.appendChild(empty);
    } else {
      cat.designs.forEach(function(d, i) {
        var fid   = extractFileId(d.url);
        var bg    = d.bg || '#ffffff';
        var thumb = fid ? 'https://drive.google.com/thumbnail?id=' + fid + '&sz=w80' : null;

        var li = document.createElement('li');
        li.className = 'design-item';

        // Thumb wrapper
        var thumbWrap = document.createElement('div');
        thumbWrap.style.cssText = 'position:relative;flex-shrink:0;';

        if (thumb) {
          var imgEl = document.createElement('img');
          imgEl.className = 'design-thumb';
          imgEl.src = thumb;
          imgEl.alt = d.name;
          imgEl.style.backgroundColor = bg;
          imgEl.onerror = function() { this.style.display = 'none'; };
          thumbWrap.appendChild(imgEl);
        } else {
          var ph = document.createElement('div');
          ph.className = 'design-thumb-placeholder';
          ph.style.backgroundColor = bg;
          ph.textContent = '🖼';
          thumbWrap.appendChild(ph);
        }

        // Color dot
        var dot = document.createElement('div');
        dot.className = 'design-bg-dot';
        dot.style.backgroundColor = bg;
        dot.title = 'Fondo: ' + bg;
        dot.style.cssText += ';position:absolute;bottom:2px;right:2px;';
        thumbWrap.appendChild(dot);
        li.appendChild(thumbWrap);

        // Info
        var info = document.createElement('div');
        info.className = 'design-info';
        info.innerHTML = '<div class="design-name">' + d.name + '</div><div class="design-url">' + d.url + '</div>';
        li.appendChild(info);

        // Delete btn
        var actions = document.createElement('div');
        var delBtn = document.createElement('button');
        delBtn.className = 'icon-btn';
        delBtn.title = 'Eliminar';
        delBtn.textContent = '✕';
        delBtn.addEventListener('click', (function(idx) { return function() { deleteDesign(idx); }; })(i));
        actions.appendChild(delBtn);
        li.appendChild(actions);
        ul.appendChild(li);
      });
    }
    section.appendChild(ul);

    // Add form
    var addForm = document.createElement('div');
    addForm.className = 'add-form';
    addForm.innerHTML =
      '<div class="section-title" style="margin-bottom:16px;">Agregar diseño</div>' +
      '<div class="add-form-row">' +
        '<div class="field" style="margin:0"><label>Nombre</label><input type="text" id="d-name" placeholder="Ej: Naruto v1" /></div>' +
        '<div class="field" style="margin:0"><label>Link de Google Drive</label><input type="text" id="d-url" placeholder="https://drive.google.com/file/d/..." /></div>' +
        '<div class="color-picker-wrap"><label>Color fondo</label><div class="color-picker-inner"><input type="color" id="d-bg" value="#ffffff" /><span class="color-hex" id="d-bg-hex">#ffffff</span></div></div>' +
        '<button class="btn btn-sm" id="add-design-btn" style="height:44px;align-self:flex-end;">+ Agregar</button>' +
      '</div>' +
      '<p class="add-form-note">Link de Drive con acceso "Cualquier persona con el link". El color de fondo se aplica detrás de la imagen.</p>';
    section.appendChild(addForm);
    panel.appendChild(section);

    // Events for add form
    document.getElementById('add-design-btn').addEventListener('click', addDesign);
    document.getElementById('d-url').addEventListener('keydown', function(e) { if (e.key === 'Enter') addDesign(); });
    document.getElementById('d-bg').addEventListener('input', function() {
      document.getElementById('d-bg-hex').textContent = this.value;
    });
  }

  // ── DRAG & DROP ──────────────────────────────────────────
  function dragStart(e, i) {
    dragSrc = i;
    e.dataTransfer.effectAllowed = 'move';
  }
  function dragOver(e, i) {
    e.preventDefault();
    document.querySelectorAll('.cat-item').forEach(function(el) { el.classList.remove('drag-over'); });
    var items = document.querySelectorAll('.cat-item');
    if (items[i]) items[i].classList.add('drag-over');
  }
  function dragDrop(e, i) {
    e.preventDefault();
    if (dragSrc === null || dragSrc === i) return;
    var item = catalog.splice(dragSrc, 1)[0];
    catalog.splice(i, 0, item);
    if      (activeCat === dragSrc)                            activeCat = i;
    else if (activeCat > dragSrc && activeCat <= i)            activeCat--;
    else if (activeCat < dragSrc && activeCat >= i)            activeCat++;
    dragSrc = null;
    renderSidebar();
    setStatus('Sin guardar', '');
  }
  function dragEnd() {
    document.querySelectorAll('.cat-item').forEach(function(el) { el.classList.remove('drag-over'); });
    dragSrc = null;
  }

  // ── UI HELPERS ───────────────────────────────────────────
  function setStatus(msg, type) {
    var el = document.getElementById('save-status');
    el.textContent = msg;
    el.className = 'save-status' + (type ? ' ' + type : '');
  }
  function showToast(msg, type) {
    type = type || 'success';
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { t.classList.remove('show'); }, 3500);
  }
</script>
</body>
</html>
