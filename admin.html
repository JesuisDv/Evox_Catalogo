<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evox Admin — Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #10101a;
      --surface2: #17172a;
      --border: #2a2a45;
      --accent: #9b5de5;
      --accent-dim: rgba(155,93,229,0.1);
      --text: #f0f0f0;
      --text-muted: #6666aa;
      --danger: #ff4444;
      --success: #00cc88;
      --radius: 4px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* LOGIN */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
    }

    .login-box .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 4px;
      margin-bottom: 8px;
    }

    .login-box .logo span { color: var(--accent); }

    .login-box p {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 40px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .field input, .field textarea, .field select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s;
      border-radius: var(--radius);
    }

    .field input:focus, .field textarea:focus {
      border-color: var(--accent);
    }

    .field textarea {
      resize: vertical;
      min-height: 80px;
    }

    .btn {
      background: var(--accent);
      color: #000;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 14px 24px;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .btn-ghost:hover { border-color: var(--text-muted); color: var(--text); opacity: 1; }

    .btn-danger {
      background: transparent;
      border: 1px solid var(--danger);
      color: var(--danger);
    }

    .btn-danger:hover { background: var(--danger); color: white; opacity: 1; }

    .btn-sm {
      padding: 8px 16px;
      font-size: 10px;
      width: auto;
    }

    .login-error {
      background: rgba(255,68,68,0.1);
      border: 1px solid var(--danger);
      color: var(--danger);
      padding: 10px 16px;
      font-size: 12px;
      letter-spacing: 1px;
      margin-bottom: 16px;
      display: none;
    }

    /* ADMIN LAYOUT */
    .admin-screen { display: none; }

    header {
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 4px;
    }

    .logo span { color: var(--accent); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .save-status {
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    .save-status.saving { color: var(--accent); }
    .save-status.saved { color: var(--success); }
    .save-status.error { color: var(--danger); }

    .admin-body {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: calc(100vh - 65px);
    }

    /* SIDEBAR */
    .sidebar {
      border-right: 1px solid var(--border);
      padding: 24px;
      overflow-y: auto;
    }

    .sidebar-title {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .cat-list {
      list-style: none;
      margin-bottom: 20px;
    }

    .cat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      cursor: pointer;
      border: 1px solid transparent;
      border-radius: var(--radius);
      margin-bottom: 4px;
      transition: all 0.15s;
      user-select: none;
    }

    .cat-item:hover { background: var(--surface2); border-color: var(--border); }

    .cat-item.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .cat-item .drag-handle {
      color: var(--text-muted);
      cursor: grab;
      font-size: 14px;
      opacity: 0.4;
    }

    .cat-item .cat-name {
      flex: 1;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .cat-item .cat-count {
      font-size: 10px;
      color: var(--text-muted);
    }

    .cat-item.dragging {
      opacity: 0.4;
      background: var(--surface2);
    }

    .cat-item.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    /* MAIN PANEL */
    .panel {
      padding: 32px 40px;
      overflow-y: auto;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .panel-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
    }

    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 24px;
      margin-bottom: 20px;
      border-radius: var(--radius);
    }

    .section-title {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    /* DESIGN LIST */
    .design-list {
      list-style: none;
      margin-bottom: 20px;
    }

    .design-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
      transition: border-color 0.15s;
    }

    .design-item:hover { border-color: #3a3a3a; }

    .design-thumb {
      width: 48px;
      height: 48px;
      object-fit: cover;
      background: #1e1e1e;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .design-thumb-placeholder {
      width: 48px;
      height: 48px;
      background: #1e1e1e;
      border-radius: 2px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .design-info {
      flex: 1;
      min-width: 0;
    }

    .design-name {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .design-url {
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .design-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 32px;
      height: 32px;
      cursor: pointer;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.15s;
    }

    .icon-btn:hover { color: var(--danger); border-color: var(--danger); }

    /* ADD FORM */
    .add-design-form {
      border: 1px dashed var(--border);
      padding: 20px;
      border-radius: var(--radius);
    }

    .add-design-form .row {
      display: grid;
      grid-template-columns: 1fr 2fr auto;
      gap: 12px;
      align-items: end;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 14px 20px;
      font-size: 12px;
      letter-spacing: 1px;
      z-index: 9999;
      display: none;
      gap: 10px;
      align-items: center;
      min-width: 240px;
    }

    .toast.show { display: flex; }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error { border-color: var(--danger); color: var(--danger); }

    .empty-panel {
      padding: 60px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      letter-spacing: 1px;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    @media (max-width: 768px) {
      .admin-body { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
      header { padding: 16px 20px; }
      .panel { padding: 24px 20px; }
      .add-design-form .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-screen" id="login-screen">
    <div class="login-box">
      <div class="logo">EVOX<span>.</span>WEAR</div>
      <p>Panel de administración</p>
      <div class="login-error" id="login-error">Contraseña incorrecta</div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="pwd-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" />
      </div>
      <button class="btn" onclick="doLogin()">Entrar</button>
    </div>
  </div>

  <!-- ADMIN -->
  <div class="admin-screen" id="admin-screen">
    <header>
      <div class="logo">EVOX<span>.</span>WEAR <span style="font-family:Inter;font-size:11px;letter-spacing:3px;color:var(--text-muted);margin-left:12px;">ADMIN</span></div>
      <div class="header-right">
        <span class="save-status" id="save-status"></span>
        <button class="btn btn-ghost btn-sm" onclick="saveToGitHub()">💾 Guardar cambios</button>
        <button class="btn btn-ghost btn-sm" onclick="doLogout()">Salir</button>
      </div>
    </header>

    <div class="admin-body">
      <!-- SIDEBAR: categories -->
      <aside class="sidebar">
        <div class="sidebar-title">Categorías</div>
        <ul class="cat-list" id="cat-list"></ul>
        <hr class="divider" />
        <div class="section-title" style="margin-bottom:12px;">Nueva categoría</div>
        <div class="field">
          <input type="text" id="new-cat-input" placeholder="Ej: Anime, Autos, Pelis..." onkeydown="if(event.key==='Enter')addCategory()" />
        </div>
        <button class="btn btn-sm" onclick="addCategory()">+ Agregar</button>
      </aside>

      <!-- MAIN PANEL -->
      <main class="panel" id="panel">
        <div class="empty-panel">
          ← Selecciona o crea una categoría para empezar
        </div>
      </main>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    // ============================================================
    // CONFIG — cambia solo estas dos líneas si es necesario
    // ============================================================
    const GITHUB_TOKEN = ''; // Se introduce en runtime, no hardcodeado aquí
    const GITHUB_USER  = 'JesuisDv';
    const GITHUB_REPO  = 'Evox_Catalogo';
    const DATA_FILE    = 'catalog.json';
    const ADMIN_PASS   = 'evox2024'; // Cambia esto a tu contraseña
    // ============================================================

    let catalog = [];
    let activeCat = null;
    let ghToken = '';
    let dragSrc = null;

    // ---- AUTH ----
    function doLogin() {
      const pwd = document.getElementById('pwd-input').value;
      if (pwd === ADMIN_PASS) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-screen').style.display = 'block';
        // Get token from localStorage or prompt
        ghToken = localStorage.getItem('evox_gh_token') || '';
        if (!ghToken) promptToken();
        else loadFromGitHub();
      } else {
        document.getElementById('login-error').style.display = 'block';
        document.getElementById('pwd-input').value = '';
      }
    }

    function promptToken() {
      const t = prompt('Ingresa tu GitHub Token (se guarda solo en tu navegador):');
      if (t) {
        ghToken = t.trim();
        localStorage.setItem('evox_gh_token', ghToken);
        loadFromGitHub();
      }
    }

    function doLogout() {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('admin-screen').style.display = 'none';
      document.getElementById('pwd-input').value = '';
    }

    // ---- GITHUB ----
    async function loadFromGitHub() {
      setStatus('Cargando...', 'saving');
      try {
        const res = await fetch(
          `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${DATA_FILE}`,
          { headers: { Authorization: `token ${ghToken}`, Accept: 'application/vnd.github+json' } }
        );
        if (res.status === 404) {
          catalog = [];
          setStatus('Catálogo nuevo', '');
          renderSidebar();
          return;
        }
        const data = await res.json();
        catalog = JSON.parse(atob(data.content.replace(/\n/g, '')));
        setStatus('Cargado ✓', 'saved');
        renderSidebar();
      } catch (e) {
        setStatus('Error cargando', 'error');
        showToast('Error al cargar desde GitHub', 'error');
      }
    }

    async function saveToGitHub() {
      setStatus('Guardando...', 'saving');
      try {
        // Get current SHA if file exists
        let sha = '';
        const check = await fetch(
          `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${DATA_FILE}`,
          { headers: { Authorization: `token ${ghToken}`, Accept: 'application/vnd.github+json' } }
        );
        if (check.ok) {
          const d = await check.json();
          sha = d.sha;
        }

        const content = btoa(unescape(encodeURIComponent(JSON.stringify(catalog, null, 2))));
        const body = { message: 'Update catalog', content, ...(sha ? { sha } : {}) };

        const res = await fetch(
          `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${DATA_FILE}`,
          {
            method: 'PUT',
            headers: {
              Authorization: `token ${ghToken}`,
              Accept: 'application/vnd.github+json',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(body)
          }
        );

        if (!res.ok) throw new Error(await res.text());
        setStatus('Guardado ✓', 'saved');
        showToast('Catálogo guardado correctamente', 'success');
      } catch (e) {
        setStatus('Error al guardar', 'error');
        showToast('Error al guardar en GitHub', 'error');
        console.error(e);
      }
    }

    // ---- CATEGORIES ----
    function addCategory() {
      const input = document.getElementById('new-cat-input');
      const name = input.value.trim();
      if (!name) return;
      catalog.push({ name, designs: [] });
      input.value = '';
      activeCat = catalog.length - 1;
      renderSidebar();
      renderPanel();
      setStatus('Sin guardar', '');
    }

    function deleteCategory(i) {
      if (!confirm(`¿Eliminar la categoría "${catalog[i].name}" y todos sus diseños?`)) return;
      catalog.splice(i, 1);
      if (activeCat >= catalog.length) activeCat = catalog.length - 1;
      if (activeCat < 0) activeCat = null;
      renderSidebar();
      renderPanel();
      setStatus('Sin guardar', '');
    }

    function renameCategory(i) {
      const name = prompt('Nuevo nombre:', catalog[i].name);
      if (name && name.trim()) {
        catalog[i].name = name.trim();
        renderSidebar();
        renderPanel();
        setStatus('Sin guardar', '');
      }
    }

    // ---- DESIGNS ----
    function addDesign() {
      if (activeCat === null) return;
      const name = document.getElementById('d-name').value.trim();
      const url  = document.getElementById('d-url').value.trim();
      if (!name || !url) { showToast('Completa nombre y URL', 'error'); return; }
      catalog[activeCat].designs.push({ name, url });
      document.getElementById('d-name').value = '';
      document.getElementById('d-url').value = '';
      renderPanel();
      setStatus('Sin guardar', '');
    }

    function deleteDesign(i) {
      catalog[activeCat].designs.splice(i, 1);
      renderPanel();
      setStatus('Sin guardar', '');
    }

    function extractFileId(url) {
      const patterns = [/\/file\/d\/([a-zA-Z0-9_-]+)/, /id=([a-zA-Z0-9_-]+)/, /\/d\/([a-zA-Z0-9_-]+)/];
      for (const p of patterns) { const m = url.match(p); if (m) return m[1]; }
      return null;
    }

    // ---- RENDER ----
    function renderSidebar() {
      const list = document.getElementById('cat-list');
      list.innerHTML = catalog.map((cat, i) => `
        <li class="cat-item ${i === activeCat ? 'active' : ''}"
            draggable="true"
            ondragstart="dragStart(event,${i})"
            ondragover="dragOver(event,${i})"
            ondrop="dragDrop(event,${i})"
            ondragend="dragEnd()"
            onclick="selectCat(${i})">
          <span class="drag-handle">⠿</span>
          <span class="cat-name">${cat.name}</span>
          <span class="cat-count">${cat.designs.length}</span>
        </li>
      `).join('');
    }

    function selectCat(i) {
      activeCat = i;
      renderSidebar();
      renderPanel();
    }

    function renderPanel() {
      const panel = document.getElementById('panel');
      if (activeCat === null || activeCat >= catalog.length) {
        panel.innerHTML = `<div class="empty-panel">← Selecciona o crea una categoría para empezar</div>`;
        return;
      }
      const cat = catalog[activeCat];

      panel.innerHTML = `
        <div class="panel-header">
          <h2 class="panel-title">${cat.name}</h2>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-ghost btn-sm" onclick="renameCategory(${activeCat})">✏️ Renombrar</button>
            <button class="btn btn-danger btn-sm" onclick="deleteCategory(${activeCat})">🗑 Eliminar categoría</button>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Diseños (${cat.designs.length})</div>
          <ul class="design-list" id="design-list">
            ${cat.designs.length ? cat.designs.map((d, i) => {
              const fid = extractFileId(d.url);
              const thumb = fid ? `https://drive.google.com/thumbnail?id=${fid}&sz=w80` : null;
              return `
                <li class="design-item">
                  ${thumb
                    ? `<img class="design-thumb" src="${thumb}" alt="${d.name}" onerror="this.style.display='none'" />`
                    : `<div class="design-thumb-placeholder">🖼</div>`}
                  <div class="design-info">
                    <div class="design-name">${d.name}</div>
                    <div class="design-url">${d.url}</div>
                  </div>
                  <div class="design-actions">
                    <button class="icon-btn" title="Eliminar" onclick="deleteDesign(${i})">✕</button>
                  </div>
                </li>`;
            }).join('') : '<li style="font-size:12px;color:var(--text-muted);padding:12px;letter-spacing:1px;">No hay diseños aún. Agrega uno abajo.</li>'}
          </ul>

          <div class="add-design-form">
            <div class="section-title" style="margin-bottom:16px;">Agregar diseño</div>
            <div class="row">
              <div class="field" style="margin:0">
                <label>Nombre</label>
                <input type="text" id="d-name" placeholder="Ej: Naruto v1" />
              </div>
              <div class="field" style="margin:0">
                <label>Link de Google Drive</label>
                <input type="text" id="d-url" placeholder="https://drive.google.com/file/d/..." onkeydown="if(event.key==='Enter')addDesign()" />
              </div>
              <button class="btn btn-sm" style="height:44px;align-self:flex-end;" onclick="addDesign()">+ Agregar</button>
            </div>
            <p style="font-size:10px;color:var(--text-muted);margin-top:10px;letter-spacing:1px;">
              Pega el link de compartir de Drive. La imagen debe ser pública ("cualquier persona con el link puede ver").
            </p>
          </div>
        </div>
      `;
    }

    // ---- DRAG & DROP (reorder categories) ----
    function dragStart(e, i) {
      dragSrc = i;
      e.currentTarget.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }

    function dragOver(e, i) {
      e.preventDefault();
      document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('drag-over'));
      document.querySelectorAll('.cat-item')[i]?.classList.add('drag-over');
    }

    function dragDrop(e, i) {
      e.preventDefault();
      if (dragSrc === null || dragSrc === i) return;
      const item = catalog.splice(dragSrc, 1)[0];
      catalog.splice(i, 0, item);
      if (activeCat === dragSrc) activeCat = i;
      else if (activeCat > dragSrc && activeCat <= i) activeCat--;
      else if (activeCat < dragSrc && activeCat >= i) activeCat++;
      dragSrc = null;
      renderSidebar();
      setStatus('Sin guardar', '');
    }

    function dragEnd() {
      document.querySelectorAll('.cat-item').forEach(el => {
        el.classList.remove('dragging', 'drag-over');
      });
      dragSrc = null;
    }

    // ---- UI HELPERS ----
    function setStatus(msg, type) {
      const el = document.getElementById('save-status');
      el.textContent = msg;
      el.className = 'save-status ' + (type || '');
    }

    let toastTimer;
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast show ${type}`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
    }
  </script>
</body>
</html>
